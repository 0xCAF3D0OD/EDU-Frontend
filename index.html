<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon-180.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#FD4401" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Allô Remplaçant" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Allô Remplaçant</title>
    <style>
        html, body { height: 100%; margin: 0; }
        #app { height: 100%; }
    </style>
</head>
<body>
<div id="app"></div>
<script>
    // Apply saved theme before paint to avoid a flash of the wrong theme
    (function () {
        var valid = ['creme', 'nuit', 'foret', 'lavande', 'vaud']
        var saved = localStorage.getItem('theme')
        if (saved === 'dark') saved = 'nuit'
        var theme = valid.indexOf(saved) !== -1 ? saved : 'creme'
        document.documentElement.classList.add('theme-' + theme)
        if (theme === 'nuit') document.documentElement.classList.add('dark')
    })()
</script>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
